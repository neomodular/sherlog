name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      # gofmt must report nothing — fail the build on any unformatted file.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      # sherlog releases a Windows binary (Scoop + manual zip), so the Windows
      # cross-build is a supported target and must not regress. A unix-only
      # syscall placed outside a *_unix.go file compiles fine on Linux but breaks
      # windows/*; this step catches that at PR time instead of at release time.
      # Both Windows GOARCHes are released, so verify both.
      - name: cross-build (windows)
        run: |
          GOOS=windows GOARCH=amd64 go build ./...
          GOOS=windows GOARCH=arm64 go build ./...

      # -race needs CGO; Windows dev machines without a GNU toolchain can't run
      # it locally, so CI is the authoritative race check.
      - name: test
        run: go test -race ./...
