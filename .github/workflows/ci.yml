name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      # gofmt must report nothing — fail the build on any unformatted file.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: vet
        run: go vet ./...

      - name: build
        run: go build ./...

      # -race needs CGO; Windows dev machines without a GNU toolchain can't run
      # it locally, so CI is the authoritative race check.
      - name: test
        run: go test -race ./...
