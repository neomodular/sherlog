# goreleaser config for sherlog (task 7.1/7.2).
# One config drives all six targets (darwin/linux/windows × arm64/amd64), the
# Homebrew tap, and the winget manifest (D1, D14).
#
# Validate locally with: goreleaser release --clean --snapshot --skip=publish
# Do NOT gate on `goreleaser check`: it exits non-zero on the deliberately
# retained `brews` block (deprecation, not an error of substance — see the
# `brews:` comment below). The release pipeline runs only `release --clean`
# against the pinned v2.16.0, which exits 0 and emits the correct 4-target tap
# formula (the tap stays darwin/linux-only; windows ships via release zips and
# winget); the standalone `check` failure is expected and waived.
version: 2

project_name: sherlog

before:
  hooks:
    # Read-only at release time: fetch deps without mutating go.mod/go.sum
    # (tidy is a dev-time maintenance op; CI verifies tidiness separately).
    - go mod download

builds:
  - id: sherlog
    main: ./cmd/sherlog
    binary: sherlog
    # Pure-Go static binary, no CGO — keeps cross-compilation trivial (D1, D5).
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    # Inject the release version into main.version (the `var version` in
    # cmd/sherlog/main.go, set per task 5.1). -s -w strip the symbol table.
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - arm64
      - amd64

archives:
  - id: sherlog
    formats: [tar.gz]
    # winget requires zip archives for its zip/portable nested installer type,
    # and zip is the native expectation on Windows anyway.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew tap publication (task 7.2). A formula (not a cask) installs on both
# macOS and Linux via `brew install neomodular/tap/sherlog`, covering all four
# release targets (D14). Casks are macOS-only, so they would strand the required
# linux/arm64 + linux/amd64 builds — `homebrew_casks`, the replacement for
# `brews`, is therefore not viable here.
#
# `brews` is hard-deprecated as of goreleaser v2.16 (it still generates the
# correct multi-OS formula and is only removed on a major version, i.e. v3).
# This deprecation is accepted deliberately: `goreleaser check` reports a
# deprecation warning, not an error of substance. The release pipeline pins
# goreleaser to a known-good version (see .github/workflows/release.yml) so it
# cannot float onto a release that drops `brews`; that pin must be bumped only
# after re-validating `goreleaser check` against the new version.
brews:
  - name: sherlog
    repository:
      owner: neomodular
      name: homebrew-tap
      branch: main
      # Cross-repo push needs a PAT with repo scope on the tap, supplied by CI
      # as TAP_GITHUB_TOKEN (documented in .github/workflows/release.yml).
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/neomodular/sherlog"
    description: "Hypothesis-driven debugging for Claude Code — the /debug detective loop over a localhost daemon on :2218"

# winget publication. goreleaser generates the manifest (zip installer with a
# nested portable exe), pushes it to the neomodular/winget-pkgs fork, and opens
# a PR against microsoft/winget-pkgs.
#
# Prerequisites before tagging a release with this block active:
#   1. Fork https://github.com/microsoft/winget-pkgs to the neomodular account
#      (goreleaser pushes the manifest branch there).
#   2. TAP_GITHUB_TOKEN must be a classic PAT with `public_repo` scope so it can
#      push to the fork and open the upstream PR (the same token already pushes
#      the Homebrew formula).
# New-package PRs go through microsoft/winget-pkgs moderation (typically a few
# days). Until it merges, Windows users install from the GitHub release zip.
winget:
  - name: sherlog
    publisher: neomodular
    package_identifier: neomodular.sherlog
    short_description: "Hypothesis-driven debugging for Claude Code"
    license: "MIT"
    homepage: "https://github.com/neomodular/sherlog"
    publisher_url: "https://github.com/neomodular"
    publisher_support_url: "https://github.com/neomodular/sherlog/issues"
    release_notes_url: "https://github.com/neomodular/sherlog/releases/tag/{{ .Tag }}"
    repository:
      owner: neomodular
      name: winget-pkgs
      branch: "sherlog-{{ .Version }}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

release:
  github:
    owner: neomodular
    name: sherlog
