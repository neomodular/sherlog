# goreleaser config for sherlog (task 7.1/7.2).
# One config drives all six targets (darwin/linux/windows × arm64/amd64), the
# Homebrew tap (macOS + Linux), and the Scoop bucket (Windows) (D1, D14).
#
# Validate locally with: goreleaser release --clean --snapshot --skip=publish
# Do NOT gate on `goreleaser check`: it exits non-zero on the deliberately
# retained `brews` block (deprecation, not an error of substance — see the
# `brews:` comment below). The release pipeline runs only `release --clean`
# against the pinned v2.16.0, which exits 0 and emits the correct 4-target tap
# formula; the standalone `check` failure is expected and waived.
version: 2

project_name: sherlog

before:
  hooks:
    # Read-only at release time: fetch deps without mutating go.mod/go.sum
    # (tidy is a dev-time maintenance op; CI verifies tidiness separately).
    - go mod download

builds:
  - id: sherlog
    main: ./cmd/sherlog
    binary: sherlog
    # Pure-Go static binary, no CGO — keeps cross-compilation trivial (D1, D5).
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    # Inject the release version into main.version (the `var version` in
    # cmd/sherlog/main.go, set per task 5.1). -s -w strip the symbol table.
    ldflags:
      - -s -w -X main.version={{.Version}}
    # windows/{amd64,arm64} cross-compile cleanly: the OS-specific pieces
    # (daemon detach in internal/mcp/spawn_windows.go, the binary watcher's
    # non-syscall fallback in internal/daemon/binwatch_other.go) are already
    # split behind build tags, and home resolution uses os.UserHomeDir()
    # (USERPROFILE on Windows). CGO_ENABLED=0 keeps the cross-build trivial.
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - arm64
      - amd64

archives:
  - id: sherlog
    formats: [tar.gz]
    # Windows ships as .zip, not .tar.gz: it is the format Windows users expect
    # and unzip natively, and Scoop *requires* a zip archive to install from (a
    # binary/tar.gz archive is rejected by the scoop manifest generator).
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew tap publication (task 7.2). A formula (not a cask) installs on both
# macOS and Linux via `brew install neomodular/tap/sherlog`, covering the four
# unix release targets (D14). Casks are macOS-only, so they would strand the
# required linux/arm64 + linux/amd64 builds — `homebrew_casks`, the replacement
# for `brews`, is therefore not viable here. Windows is served by Scoop below,
# not Homebrew.
#
# `brews` is hard-deprecated as of goreleaser v2.16 (it still generates the
# correct multi-OS formula and is only removed on a major version, i.e. v3).
# This deprecation is accepted deliberately: `goreleaser check` reports a
# deprecation warning, not an error of substance. The release pipeline pins
# goreleaser to a known-good version (see .github/workflows/release.yml) so it
# cannot float onto a release that drops `brews`; that pin must be bumped only
# after re-validating `goreleaser check` against the new version.
brews:
  - name: sherlog
    repository:
      owner: neomodular
      name: homebrew-tap
      branch: main
      # Cross-repo push needs a PAT with repo scope on the tap, supplied by CI
      # as TAP_GITHUB_TOKEN (documented in .github/workflows/release.yml).
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/neomodular/sherlog"
    description: "Hypothesis-driven debugging for Claude Code — the /debug detective loop over a localhost daemon on :2218"

# Scoop bucket publication — the Windows counterpart to the Homebrew tap. Scoop
# installs the windows/amd64 .zip via `scoop install sherlog` once the bucket is
# added. goreleaser generates the manifest from the release's windows zip and
# pushes it to neomodular/scoop-bucket. Unlike `brews`, `scoops` is NOT
# deprecated, so this block is future-proof against the v3 removal of `brews`.
#
# One-time setup (documented in .github/workflows/release.yml):
#   1. Create the empty public repo neomodular/scoop-bucket.
#   2. Add a repo-scoped PAT as the SCOOP_GITHUB_TOKEN secret on this repo.
scoops:
  - name: sherlog
    repository:
      owner: neomodular
      name: scoop-bucket
      branch: main
      # Cross-repo push needs a PAT with repo scope on the bucket, supplied by
      # CI as SCOOP_GITHUB_TOKEN (documented in .github/workflows/release.yml).
      token: "{{ .Env.SCOOP_GITHUB_TOKEN }}"
    homepage: "https://github.com/neomodular/sherlog"
    description: "Hypothesis-driven debugging for Claude Code — the /debug detective loop over a localhost daemon on :2218"
    license: MIT
    commit_msg_template: "chore(scoop): sherlog {{ .Tag }}"

release:
  github:
    owner: neomodular
    name: sherlog
